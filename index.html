<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CV Mobile Builder</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <!-- html2canvas library for saving as image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-orange: #FF8C00;
            --navy: #000080; 
            --glow: #00FFFF; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-orange);
            font-family: 'Lato', sans-serif;
            overflow: hidden;
        }

        /* --- CIRCUIT BACKGROUND --- */
        #circuit-container {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }
        .base-line { fill: none; stroke: var(--navy); stroke-width: 2; opacity: 0.15; }
        .liquid-pulse {
            fill: none; stroke: var(--navy); stroke-width: 4;
            stroke-linecap: round; filter: drop-shadow(0 0 8px var(--glow));
            stroke-dasharray: 50, 250; animation: movePulse 4s linear infinite;
        }
        @keyframes movePulse { from { stroke-dashoffset: 300; } to { stroke-dashoffset: 0; } }

        /* --- UI PAGE SYSTEM --- */
        .page {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10;
        }
        #page-1 { display: flex; }

        .label-text {
            color: var(--navy); font-size: 1.6rem; font-weight: 900;
            margin-bottom: 20px; text-transform: lowercase; text-align: center;
        }

        .input-box, .text-area {
            width: 85%; padding: 12px; font-size: 1rem;
            border: 3px solid var(--navy); border-radius: 12px;
            outline: none; color: var(--navy);
            background: rgba(255, 255, 255, 0.95); margin-bottom: 10px;
        }
        .text-area { height: 120px; resize: none; }

        /* --- CV PREVIEW FRAME (PAGE 7) --- */
        .cv-preview-frame {
            width: 80vw;
            aspect-ratio: 9 / 16;
            background-color: #fff;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            z-index: 15;
            position: relative;
            overflow: hidden;
            padding: 0;
        }

        #designLayer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .cv-content-wrapper {
            position: relative;
            z-index: 2;
            width: 100%; height: 100%;
        }

        /* CV Text Elements */
        .preview-name-header { width: 100%; padding-top: 10px; text-align: center; }
        #previewName {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            color: var(--navy);
            display: inline-block;
            border-bottom: 1px solid var(--navy);
            line-height: 1;
            padding-bottom: 2px;
        }

        .cv-section { position: absolute; width: 46%; padding: 0 5px; }
        .preview-heading {
            font-family: 'Bebas Neue', cursive;
            font-size: 0.9rem; color: var(--navy);
            margin: 0 0 3px 0; text-align: center;
        }
        .preview-text, .preview-list li, .preview-contact-item {
            font-family: 'Lato', sans-serif;
            font-size: 0.52rem; line-height: 1.2;
            color: #000; font-weight: 700; margin: 0;
        }
        .preview-list { margin: 0; padding-left: 10px; list-style-type: disc; }

        /* Position anchors */
        #previewAboutContainer { top: 45px; right: 5px; text-align: center; }
        #previewSkillsContainer { left: 5px; text-align: left; }
        #previewExpContainer { right: 5px; text-align: left; }
        #previewContactContainer { left: 5px; text-align: left; }

        /* Navigation */
        .cv-button, .nav-btn {
            font-weight: 800; color: var(--navy);
            background-color: #FFFFFF; border: none; border-radius: 50px;
            text-transform: lowercase; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .cv-button { padding: 20px 45px; font-size: 1.3rem; }
        .nav-btn { padding: 10px 22px; font-size: 0.85rem; }
        .bottom-nav {
            position: fixed; bottom: 30px; left: 0; width: 100%;
            padding: 0 20px; display: flex; justify-content: space-between;
        }
        .scroll-container {
            width: 100%; display: flex; flex-direction: column;
            align-items: center; max-height: 40vh; overflow-y: auto;
        }
    </style>
</head>
<body>

    <svg id="circuit-container" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
        <g id="circuit-group"></g>
    </svg>

    <!-- CONTENT PAGES -->
    <div id="page-1" class="page"><button class="cv-button" onclick="showPage(2)">create your CV</button></div>
    <div id="page-2" class="page">
        <label class="label-text">enter your name</label>
        <input type="text" id="nameInput" class="input-box" placeholder="...">
        <div class="bottom-nav"><button class="nav-btn" onclick="showPage(1)">back</button><button class="nav-btn" onclick="showPage(3)">next</button></div>
    </div>
    <div id="page-3" class="page">
        <label class="label-text">about you</label>
        <textarea id="aboutInput" class="text-area" maxlength="1000"></textarea>
        <div class="bottom-nav"><button class="nav-btn" onclick="showPage(2)">back</button><button class="nav-btn" onclick="showPage(4)">next</button></div>
    </div>
    <div id="page-4" class="page">
        <label class="label-text">enter your skills</label>
        <div class="scroll-container">
            <input type="text" class="skill-in input-box" placeholder="skill 1"><input type="text" class="skill-in input-box" placeholder="skill 2">
            <input type="text" class="skill-in input-box" placeholder="skill 3"><input type="text" class="skill-in input-box" placeholder="skill 4">
            <input type="text" class="skill-in input-box" placeholder="skill 5"><input type="text" class="skill-in input-box" placeholder="skill 6">
        </div>
        <div class="bottom-nav"><button class="nav-btn" onclick="showPage(3)">back</button><button class="nav-btn" onclick="showPage(5)">next</button></div>
    </div>
    <div id="page-5" class="page">
        <label class="label-text">enter your experience</label>
        <div class="scroll-container">
            <input type="text" class="exp-in input-box" placeholder="exp 1"><input type="text" class="exp-in input-box" placeholder="exp 2">
            <input type="text" class="exp-in input-box" placeholder="exp 3"><input type="text" class="exp-in input-box" placeholder="exp 4">
            <input type="text" class="exp-in input-box" placeholder="exp 5"><input type="text" class="exp-in input-box" placeholder="exp 6">
        </div>
        <div class="bottom-nav"><button class="nav-btn" onclick="showPage(4)">back</button><button class="nav-btn" onclick="showPage(6)">next</button></div>
    </div>
    <div id="page-6" class="page">
        <label class="label-text">contact details</label>
        <input type="text" id="twitterIn" class="input-box" placeholder="twitter"><input type="text" id="telegramIn" class="input-box" placeholder="telegram"><input type="email" id="emailIn" class="input-box" placeholder="email">
        <div class="bottom-nav"><button class="nav-btn" onclick="showPage(5)">back</button><button class="nav-btn" onclick="showPage(7)">next</button></div>
    </div>

    <!-- PAGE 7: FINAL PREVIEW -->
    <div id="page-7" class="page">
        <div class="cv-preview-frame" id="cvFrame">
            <svg id="designLayer"></svg>
            <div class="cv-content-wrapper">
                <div class="preview-name-header"><span id="previewName">NAME</span></div>
                <div id="previewAboutContainer" class="cv-section"><h2 class="preview-heading">ABOUT ME</h2><p id="previewAbout" class="preview-text"></p></div>
                <div id="previewSkillsContainer" class="cv-section"><h2 class="preview-heading">SKILLS</h2><ul id="previewSkillsList" class="preview-list"></ul></div>
                <div id="previewExpContainer" class="cv-section"><h2 class="preview-heading">EXPERIENCE</h2><ul id="previewExpList" class="preview-list"></ul></div>
                <div id="previewContactContainer" class="cv-section"><h2 class="preview-heading">CONTACT</h2>
                    <div id="previewTwitter" class="preview-contact-item"></div><div id="previewTelegram" class="preview-contact-item"></div><div id="previewEmail" class="preview-contact-item"></div>
                </div>
            </div>
        </div>
        <div class="bottom-nav">
            <button class="nav-btn" onclick="showPage(6)">back</button>
            <button class="nav-btn" onclick="saveCVImage()">save as image</button>
        </div>
    </div>

    <script>
        // Global Circuit
        const group = document.getElementById('circuit-group');
        for (let i = 0; i < 20; i++) {
            const angle = (i * 18) * (Math.PI / 180);
            const pathData = `M ${500 + Math.cos(angle) * 700},${500 + Math.sin(angle) * 700} L 500,500`;
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.innerHTML = `<path class="base-line" d="${pathData}" /><path class="liquid-pulse" d="${pathData}" style="animation-delay: -${Math.random() * 4}s" />`;
            group.appendChild(g);
        }

        // Random Tech Design Logic
        function generateTechDesign() {
            const frame = document.getElementById('cvFrame');
            const layer = document.getElementById('designLayer');
            layer.innerHTML = "";
            const lightColors = ['#B2DFDB', '#B3E5FC', '#FFCCBC', '#D1C4E9', '#F8BBD0', '#DCEDC8'];
            frame.style.backgroundColor = lightColors[Math.floor(Math.random() * lightColors.length)];

            for (let i = 0; i < 12; i++) {
                const type = Math.floor(Math.random() * 3);
                const el = document.createElementNS("http://www.w3.org/2000/svg", type === 0 ? "circle" : (type === 1 ? "rect" : "line"));
                const x = Math.random() * 100, y = Math.random() * 100;

                if (type === 0) { el.setAttribute("cx", x + "%"); el.setAttribute("cy", y + "%"); el.setAttribute("r", 5 + Math.random() * 30); }
                else if (type === 1) { el.setAttribute("x", x + "%"); el.setAttribute("y", y + "%"); el.setAttribute("width", 20 + Math.random() * 50); el.setAttribute("height", 20 + Math.random() * 50); el.setAttribute("transform", `rotate(${Math.random()*45} ${x} ${y})`); }
                else { el.setAttribute("x1", x + "%"); el.setAttribute("y1", y + "%"); el.setAttribute("x2", (x + 20) + "%"); el.setAttribute("y2", (y + 10) + "%"); el.setAttribute("stroke-width", "3"); }
                
                el.setAttribute("fill", "none"); el.setAttribute("stroke", "#000080"); el.setAttribute("stroke-opacity", "0.2");
                if (type !== 2) el.setAttribute("stroke-width", "2");
                layer.appendChild(el);
            }
        }

        // --- NEW SAVE FUNCTION ---
        function saveCVImage() {
            const frame = document.getElementById('cvFrame');
            const saveBtn = document.querySelector('button[onclick="saveCVImage()"]');
            
            saveBtn.innerText = "Processing...";
            
            // Use html2canvas to render the frame as an image
            html2canvas(frame, {
                scale: 3, // High quality output
                useCORS: true,
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'My_CV.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
                saveBtn.innerText = "save as image";
            }).catch(err => {
                console.error(err);
                alert("Failed to save image. Try again.");
                saveBtn.innerText = "save as image";
            });
        }

        function showPage(num) {
            if (num === 7) {
                generateTechDesign();
                document.getElementById('previewName').innerText = document.getElementById('nameInput').value.toUpperCase() || "YOUR NAME";
                document.getElementById('previewAbout').innerText = document.getElementById('aboutInput').value || "Describe yourself...";
                
                const pop = (cls, id) => {
                    const l = document.getElementById(id); l.innerHTML = "";
                    document.querySelectorAll('.' + cls).forEach(i => { if(i.value.trim()){ let li = document.createElement('li'); li.innerText = i.value; l.appendChild(li); }});
                };
                pop('skill-in', 'previewSkillsList'); pop('exp-in', 'previewExpList');
                
                document.getElementById('previewTwitter').innerText = document.getElementById('twitterIn').value ? "X: " + document.getElementById('twitterIn').value : "";
                document.getElementById('previewTelegram').innerText = document.getElementById('telegramIn').value ? "TG: " + document.getElementById('telegramIn').value : "";
                document.getElementById('previewEmail').innerText = document.getElementById('emailIn').value ? "E: " + document.getElementById('emailIn').value : "";

                setTimeout(() => {
                    const a = document.getElementById('previewAboutContainer'), s = document.getElementById('previewSkillsContainer'), e = document.getElementById('previewExpContainer'), c = document.getElementById('previewContactContainer');
                    s.style.top = (a.offsetTop + a.offsetHeight + 10) + "px";
                    e.style.top = (s.offsetTop + s.offsetHeight + 10) + "px";
                    c.style.top = (e.offsetTop + e.offsetHeight + 10) + "px";
                }, 50);
            }
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('page-' + num).style.display = 'flex';
        }
    </script>
</body>
</html>
